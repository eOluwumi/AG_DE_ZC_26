id: 07_gcp_setup 
namespace: zoomcamp

tasks:
  - id: create_gcs_bucket
    type: io.kestra.plugin.gcp.gcs.CreateBucket
    ifExists: SKIP
    storageClass: REGIONAL
    name: "{{ kv('GCP_BUCKET_NAME', 'zoomcamp') }}"

  - id: create_bq_dataset
    type: io.kestra.plugin.gcp.bigquery.CreateDataset
    name: "{{ kv('GCP_DATASET', 'zoomcamp') }}"
    ifExists: SKIP

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      serviceAccount: "{{ kv('GCP_CREDS', 'zoomcamp') }}"
      projectId: "{{ kv('GCP_PROJECT_ID', 'zoomcamp') }}"
      location: "{{ kv('GCP_LOCATION', 'zoomcamp') }}"
      bucket: "{{ kv('GCP_BUCKET_NAME', 'zoomcamp') }}"